services:
  - type: web
    name: lumina-ai-backend
    env: node
    buildCommand: npm install
    startCommand: npx tsx index.ts
    envVars:
      - key: NODE_VERSION
        value: 24.14.1

  - type: cron
    name: keep-alive
    env: node
    schedule: "*/5 * * * *"
    buildCommand: echo "keep alive"
    startCommand: curl https://lumina-ai-1-intq.onrender.com